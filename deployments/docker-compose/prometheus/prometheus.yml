global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'onboarding'
    static_configs:
      - targets: ['onboarding-service:8081']
  - job_name: 'order'
    static_configs:
      - targets: ['order-service:8082']
  - job_name: 'billing'
    static_configs:
      - targets: ['billing-service:8083']
  - job_name: 'rating-engine'
    static_configs:
      - targets: ['rating-engine:8080']
